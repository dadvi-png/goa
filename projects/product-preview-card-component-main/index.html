<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Product preview card component</title>


</head>

<body>

  <!-- Perfume

  Gabrielle Essence Eau De Parfum

  A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.

  $149.99
  $169.99

  Add to Cart -->
  <div id="full">
    <div id="half">
      <img src="./images/image-product-desktop.jpg" id="pic">
      <b class="a" id="per">Perfume</b>
      <h1 class="a" id="pe"> Gabrielle Essence Eau De Parfum</h1>
      <p class="a" id="IT">A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.</p>

      <div>
        <h1 class="a" id="money">$149.99</h1><p class="a" id="dollars">$169.99</p>
        
      </div>
      <div>
        <button class="a" id="h"> <img src="./images/icon-cart.svg">  <h1> Add to Cart</h1> </button>
        

      </div>


    </div>
  </div>

</body>

</html>
